# superapp.conf — Nginx reverse proxy for superapp API
# Install: sudo cp superapp.conf /etc/nginx/sites-available/superapp
# Enable:  sudo ln -s /etc/nginx/sites-available/superapp /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx

upstream api_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream vton_proxy {
    server 127.0.0.1:8001;
    keepalive 8;
}

# Rate limit zone: 10 req/sec per IP for auth endpoints
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS (uncomment when certs are ready)
    # return 301 https://$host$request_uri;

    # ─── Security headers ────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ─── API Gateway ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ─── Auth endpoints (stricter rate limit) ────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }

    # ─── SSE streaming (no buffering) ────────────────────────────────
    location /api/v1/stream {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ─── VTON proxy (long-running requests) ──────────────────────────
    location /api/v1/tryon {
        proxy_pass http://vton_proxy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
    }

    # ─── Health checks ───────────────────────────────────────────────
    location /health {
        proxy_pass http://api_gateway;
        proxy_set_header Connection "";
    }

    # ─── Static uploads (cache aggressively) ─────────────────────────
    location /uploads/ {
        proxy_pass http://api_gateway;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Block dotfiles ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

