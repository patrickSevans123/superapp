name: superapp
description: Superapp combining trade, fashion, and scholarship.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # ─── Shared packages (path → existing repos, no git merge) ───
  shared_ui:
    path: ../../packages/shared_ui
  shared_models:
    path: ../../packages/shared_models

  # ─── Backend ───
  # Auth is handled by the Go API with JWT — Supabase is no longer used.
  # supabase_flutter: ^2.5.9

  # ─── State management ───
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─── Navigation ───
  go_router: ^14.2.7

  # ─── Network ───
  dio: ^5.6.0

  # ─── Charts ───
  fl_chart: ^0.69.0

  # ─── Auth / Storage ───
  # shared_preferences is used for non-sensitive hints (e.g. "is the user
  # likely logged in?"). The actual JWT lives in flutter_secure_storage.
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # ─── Localisation ───
  flutter_localizations:
    sdk: flutter

  # ─── Image ───
  flutter_image_compress: ^2.4.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ─── Data models ───
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ─── UI ───
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  flutter_markdown: ^0.7.3
  url_launcher: ^6.3.0

  # ─── Push Notifications (P4) ───
  # Requires Firebase project setup: add google-services.json (Android)
  # and GoogleService-Info.plist (iOS) to respective platform folders.
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
