version: '3.8'

services:
  api-gateway:
    build: ./services/api_gateway
    ports: ["8080:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DUCKDB_PATH=/app/data/scholarships.duckdb
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET:-superapp-dev-secret-key-change-in-production-123}
      - PORT=8080
      - STATIC_DATA_DIR=/app/static-data
    volumes:
      - ./services/beasiswa_crawler/data:/app/data
      - ~/Projects/self-trade/datasets:/datasets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # mcp-trade:   ← coming soon — will be added when self-trade MCP server is ported
  # mcp-scholarship:  ← coming soon — will be added when beasiswa MCP server is ported
  # trade-daemon:  ← coming soon — will be added when self-trade daemon is ported

  vton-proxy:
    build: ./services/vton_proxy
    ports: ["8001:8001"]
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - VTON_MODEL=tencentarc/mobile-vton:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  beasiswa-scheduler:
    build: ./services/beasiswa_crawler
    environment:
      - BEASISWA_LLM_ENDPOINT=http://9router:20128/v1
    volumes:
      - beasiswa_data:/app/data
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

# mcp_trade, mcp_scholarship, trade_daemon volumes removed until services are implemented
volumes:
  beasiswa_data:
