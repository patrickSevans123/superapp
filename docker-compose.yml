version: '3.8'

services:
  api-gateway:
    build: ./services/api_gateway
    ports: ["8080:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DUCKDB_PATH=/app/data/scholarships.duckdb
      - SQLITE_PATH=/app/data/superapp.db
      - NEWS_PARQUET_DIR=/datasets/parquet/news
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set — generate with: openssl rand -hex 32}
      - PORT=8080
      - STATIC_DATA_DIR=/app/static-data
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,https://evans-thinkcentre-m720q.tail266f96.ts.net
      # Bcrypt cost factor for password hashing. Allowed range: 10-15. Default: 12.
      # - 10: faster, weaker (~100ms on modern CPU)
      # - 12: balanced, recommended for production (~400ms)
      # - 14: stronger, slower (~1.6s) — only if you have a slow-user-tolerance
      - BCRYPT_COST=12
      # TLS: uncomment + mount cert files to enable direct TLS termination
      # in the api-gateway container. For production, prefer a reverse proxy
      # (nginx/Caddy) for TLS termination instead of this.
      # - TLS_CERT_FILE=/etc/ssl/certs/api-gateway.crt
      # - TLS_KEY_FILE=/etc/ssl/private/api-gateway.key
    volumes:
      - ./services/beasiswa_crawler/data:/app/data
      - ~/Projects/self-trade/datasets:/datasets:ro
    user: "1000:1000"
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # mcp-trade:   runs as a stdio MCP server, spawned by MCP clients (Claude Desktop, etc.)
  #              not a long-running HTTP service. See services/mcp_trade/README.md.
  # mcp-scholarship:  ← coming soon — will be added when beasiswa MCP server is ported
  # trade-daemon:  ← coming soon — will be added when self-trade daemon is ported

  vton-proxy:
    build: ./services/vton_proxy
    ports: ["8001:8001"]
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - VTON_MODEL=tencentarc/mobile-vton:latest
    user: "1000:1000"
    mem_limit: 1g
    cpus: "1.0"
    pids_limit: 256
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  beasiswa-scheduler:
    build: ./services/beasiswa_crawler
    environment:
      - BEASISWA_LLM_ENDPOINT=http://9router:20128/v1
    volumes:
      - beasiswa_data:/app/data
    user: "1000:1000"
    mem_limit: 512m
    cpus: "1.0"
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "test -d /app/data && pgrep -f 'beasiswa_scraper' >/dev/null"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

# mcp_trade, mcp_scholarship, trade_daemon volumes removed until services are implemented
volumes:
  beasiswa_data:
